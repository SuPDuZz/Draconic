<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draconic to Romanized</title>
    <link rel="stylesheet" href="./style/translate-style.css">
</head>
<body>
    <div class="container">
        <!---- Title ---->
        <h1 id="translatorTitle">Draconic → Romanized</h1>

        <!---- Toggle-buttons ---->
        <div class="toggle-buttons">
            <button onclick="setMode('draconic')">Draconic → Romanized</button>
            <button onclick="setMode('romanized')">Romanized → Draconic</button>
        </div>

        <!---- Draconic to Romanized ---->
        <div id="draconicSection">
            <div id="buttons" class="button-grid"></div>
            <textarea id="inputText" class="custom-font" placeholder="Type your Draconic script here..."></textarea>
            <button onclick="copyTranslatedDraconic('inputText')" class="copyButton">Copy in Discord format</button>
            <button onclick="translateText()" class="translateButton">Translate</button>
            <textarea id="outputText" readonly placeholder="Romanized output here..."></textarea>
        </div>

        <!---- Romanized to Draconic ---->
        <div id="romanizedSection" style="display: none;">
            <div id="buttons2" class="button-grid"></div>
            <textarea id="reverseInputText" placeholder="Type Romanized text here..."></textarea>
            <button onclick="reverseTranslateText()" class="translateButton">Translate to Draconic</button>
            <textarea id="reverseOutputText" class="custom-font" readonly placeholder="Draconic output here..."></textarea>
            <button onclick="copyTranslatedDraconic('reverseOutputText')" class="copyButton">Copy in Discord format</button>
        </div> 
    </div>

    <script src="./javascript/translate-script.js"></script>
    
    <!---- Footer ---->
    <div id="footer" style="bottom: 0; left:0;"></div>
    <script src="./shared/load-footer.js"></script>
</body>
</html>
